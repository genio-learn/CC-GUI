<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC-GUI</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header>
          <h1>claude-commander</h1>
        </header>
        <div id="sessions"></div>
      </aside>
      <main id="terminal-pane">
        <div id="tabs"></div>
        <div id="terminals">
          <div id="placeholder">Select a session to attach</div>
        </div>
      </main>
      <div id="review" class="hidden">
        <header>
          <span id="review-title"></span>
          <span id="review-base"></span>
          <span class="spacer"></span>
          <button id="review-refresh" class="row-action" title="Refresh diff">↻</button>
          <button id="review-close" title="Close (Esc)">×</button>
        </header>
        <div id="review-body">
          <div id="review-files"></div>
          <div id="review-diff"></div>
        </div>
      </div>
      <aside id="detail" class="hidden">
        <header>
          <span id="detail-title"></span>
          <button id="detail-close" title="Close">×</button>
        </header>
        <dl id="detail-meta"></dl>
        <div id="detail-diffstat"></div>
        <div id="detail-summary-label">
          <span>AI summary</span>
          <button id="summary-gen" class="row-action">Generate</button>
        </div>
        <div id="detail-summary"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
