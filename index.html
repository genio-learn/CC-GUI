<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC-GUI</title>
  </head>
  <body>
    <div id="titlebar">
      <div class="tb-left">
        <span class="tb-mark"></span>
        <span class="tb-name">claude-commander</span>
        <span id="tb-count" class="tb-pill"></span>
      </div>
      <div class="tb-segment">
        <button id="tb-console">Console</button>
        <button id="tb-board">Board</button>
      </div>
      <div class="tb-right">
        <button id="tb-jump">Jump to… ⌘K</button>
        <button id="tb-theme" title="Theme">◐</button>
        <button id="tb-help" title="Help">?</button>
      </div>
    </div>
    <div id="app">
      <aside id="sidebar">
        <header>
          <h1>SESSIONS</h1>
          <button id="sidebar-menu" class="row-action" title="Projects menu">⋯</button>
        </header>
        <div id="sessions"></div>
        <footer id="sidebar-footer">
          <div id="status-legend"></div>
          <div id="commander-chip" class="hidden" title="Attach to the commander session"></div>
        </footer>
      </aside>
      <main id="terminal-pane">
        <div id="tabs"></div>
        <div id="terminals">
          <div id="placeholder">Select a session to attach.</div>
        </div>
      </main>
      <div id="review" class="hidden">
        <header>
          <span id="review-title"></span>
          <span id="review-base"></span>
          <span class="spacer"></span>
          <span id="review-status"></span>
          <button id="review-apply" class="row-action hidden" title="Send staged comments to the agent"></button>
          <button id="review-refresh" class="row-action" title="Refresh diff">↻</button>
          <button id="review-close" title="Close (Esc)">×</button>
        </header>
        <div id="review-body">
          <div id="review-files"></div>
          <div id="review-diff"></div>
        </div>
      </div>
      <aside id="detail" class="hidden">
        <header>
          <button id="detail-collapse" title="Collapse">◀</button>
          <span id="detail-title"></span>
          <button id="detail-close" title="Close">×</button>
        </header>
        <dl id="detail-meta"></dl>
        <div id="detail-diffstat"></div>
        <div id="detail-summary-label">
          <span>AI summary</span>
          <button id="summary-gen" class="row-action">↻ Generate</button>
        </div>
        <div id="detail-summary"></div>
        <div id="detail-tags"></div>
        <footer id="detail-footer">
          <button id="detail-review" class="detail-action primary">± Review diff</button>
          <button id="detail-pr" class="detail-action">Open PR</button>
        </footer>
      </aside>
      <div id="board" class="hidden">
        <div id="board-placeholder">Board view — coming soon</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
