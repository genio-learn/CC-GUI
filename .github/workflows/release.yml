name: Release

# Cut a GitHub Release whenever a v* tag is pushed (the existing release flow:
# bump version, commit "Release vX.Y.Z", tag, push). tauri-action builds each
# platform's bundle and uploads it as a release asset.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon DMG. macos-14 runners are arm64, so the native build
          # is aarch64 — no --target needed; uses tauri.conf targets (app, dmg).
          - platform: macos-14
            args: ""
          # Portable Linux AppImage (runs on any distro, incl. Arch) + .deb.
          - platform: ubuntu-latest
            args: "--bundles appimage,deb"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf libasound2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Builds the frontend (beforeBuildCommand) + the Tauri bundle, then creates
      # the release for this tag and uploads the bundle(s). The DMG is unsigned:
      # on first open users must right-click -> Open (or run `xattr -cr` on the
      # app) to get past Gatekeeper.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CC-GUI ${{ github.ref_name }}"
          releaseBody: |
            Download the asset for your platform below. `aarch64` = Apple Silicon
            (macOS); `amd64` = x86_64 (Linux).

            **macOS (.dmg, Apple Silicon):** the app is unsigned, so macOS
            quarantines it and may report it as "damaged" — it isn't. Drag
            CC-GUI.app into /Applications, then clear the quarantine flag:

            ```
            xattr -cr /Applications/CC-GUI.app
            ```

            Then open it normally.

            **Linux:** run the portable `.AppImage` (any distro) or install the `.deb`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Bump the Homebrew cask in genio-learn/homebrew-tap to this release: hash the
  # just-built macOS DMG and push version + sha256 into Casks/cc-gui.rb. Requires
  # a HOMEBREW_TAP_TOKEN repo secret — a PAT (or fine-grained token) with write
  # access to genio-learn/homebrew-tap, since the default GITHUB_TOKEN can't push
  # to another repo. If the secret is absent the step no-ops (release still ships).
  update-cask:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Bump the Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask bump." && exit 0
          fi
          version="${GITHUB_REF_NAME#v}"

          # Hash the macOS DMG attached to this release.
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern '*aarch64.dmg' --dir /tmp
          sha=$(shasum -a 256 /tmp/CC-GUI_*_aarch64.dmg | cut -d' ' -f1)

          # Clone the tap with a token that can push, rewrite the two version-
          # specific lines (the url derives the rest from #{version}), push back.
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/genio-learn/homebrew-tap.git" tap
          cd tap
          sed -i "s/^  version \".*\"/  version \"${version}\"/" Casks/cc-gui.rb
          sed -i "s/^  sha256 \".*\"/  sha256 \"${sha}\"/"      Casks/cc-gui.rb
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Cask already at ${version} — nothing to push."
          else
            git commit -aqm "cc-gui ${version}"
            git push
          fi
