name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Belt-and-braces: claude-commander-core bakes a telemetry ingest credential into
# every build and its `cfg!(test)` opt-out only applies to core's own test runs,
# not to us as a downstream consumer. No job here runs the app today, so nothing
# is emitted — but if one ever builds a CommanderService or launches the bundle,
# DO_NOT_TRACK keeps CI runs out of the live usage stream.
env:
  DO_NOT_TRACK: "1"

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  rustfmt:
    name: Rust format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf libasound2-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # tauri-build expects the frontend dist to exist when the crate compiles.
      - run: npm ci
      - run: npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
